<style>
body {
  background: var(--bg-color);
  padding-top: 100px;
}

/* TOPBAR */
.topbar {
  width: 100%;
  padding: 15px 5%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;
  top: 0;
  z-index: 100;
}

.topbar .logo {
  font-size: 24px;
  font-weight: 800;
  color: var(--secondary-color);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .logo i {
  color: var(--accent-color);
}

.back {
  text-decoration: none;
  color: var(--primary-color);
  border: 2px solid var(--gray-light);
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: 600;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
}

.back:hover {
  background: var(--secondary-color);
  color: var(--white);
  border-color: var(--secondary-color);
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

.header-title {
  text-align: center;
  margin-bottom: 50px;
  padding: 0 5%;
}

.header-title h1 {
  font-size: 48px;
  color: var(--primary-color);
  font-weight: 800;
  text-transform: capitalize;
  margin-bottom: 15px;
}

.header-title p {
  color: var(--gray-text);
  font-size: 18px;
  letter-spacing: 1px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 40px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 5% 100px;
}
</style>
</head>

// CONTAINER
const container = document.getElementById("products");

// GET CURRENT CATEGORY PRODUCTS
const products = allProducts[category] || allProducts['juteTote']; // fallback to juteTote

// CREATE CARDS
for(let i=0; i<products.length; i++){
  const product = products[i];
  // Add some visual flair: Bestseller / New tags randomly
  const badgeHtml = (i % 5 === 0) ? `<div class="card-badge">Bestseller</div>` : ((i % 7 === 0) ? `<div class="card-badge" style="background:var(--secondary-color)">New</div>` : '');

  // Fix image path for display in /pages/ directory
  const displayImage = "../" + product.image;

  container.innerHTML += `
    <div class="card" onclick="openProduct('${product.name}', '${product.image}', '${product.price}')">
      ${badgeHtml}
      <div class="img-wrapper">
        <img src="${displayImage}" alt="${product.name}" onerror="this.src='../images/1.jpg'">
      </div>
      <div class="card-content">
        <h3>${product.name}</h3>
        <p class="price">₹${product.price} <span>/ piece</span></p>
        <button>CHOOSE OPTIONS</button>
      </div>
    </div>
  `;
}

// OPEN PRODUCT PAGE
function openProduct(name, image, price){
  window.location.href = `product.html?name=${encodeURIComponent(name)}&image=${encodeURIComponent(image)}&price=${encodeURIComponent(price)}`;
}
